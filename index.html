<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI专家组辩论智能体 - 思维链深度定制版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Markdown & Highlight -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #050505;
      --bg-secondary: #0a0a0a;
      --card: #111111;
      --border: #222222;
      --fg: #e8eaed;
      --muted: #888888;
      --accent: #10b981;
      --accent-secondary: #3b82f6;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background Grid */
    .bg-grid {
      position: fixed; inset: 0;
      background-size: 32px 32px;
      background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
      mask-image: radial-gradient(circle at center, black 30%, transparent 100%);
      z-index: 0;
    }

    /* Markdown Styles */
    .md-content { line-height: 1.8; font-size: 15px; }
    .md-content h1, .md-content h2, .md-content h3 { font-weight: 700; margin-top: 1.5em; margin-bottom: 0.8em; color: var(--fg); }
    .md-content h1 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    .md-content h2 { font-size: 1.25em; color: var(--accent); }
    .md-content p { margin-bottom: 1em; white-space: pre-wrap; }
    .md-content ul, .md-content ol { padding-left: 2em; margin-bottom: 1em; }
    .md-content li { margin-bottom: 0.5em; }
    .md-content code { 
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.08); 
      padding: 0.2em 0.4em; 
      border-radius: 4px; 
      font-size: 0.9em;
      color: #fff;
    }
    .md-content pre {
      background: #0d1117; 
      padding: 1.2em; 
      border-radius: 8px; 
      overflow-x: auto; 
      margin: 1em 0;
      border: 1px solid var(--border);
    }
    .md-content pre code { background: transparent; padding: 0; font-size: 0.85em; line-height: 1.6; }
    .md-content blockquote {
      border-left: 4px solid var(--accent);
      padding: 0.5em 1em;
      margin: 1em 0;
      color: var(--muted);
      background: rgba(16, 185, 129, 0.05);
      border-radius: 0 4px 4px 0;
    }

    /* Thought Chain Styles */
    .reasoning-block {
      background: rgba(59, 130, 246, 0.05);
      border-left: 3px solid var(--accent-secondary);
      padding: 12px 16px;
      margin-bottom: 16px;
      border-radius: 4px;
      font-size: 0.9em;
      color: #a5b4fc;
    }
    .reasoning-block summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent-secondary);
    }
    .reasoning-block summary::-webkit-details-marker { display: none; }
    .reasoning-block[open] summary { margin-bottom: 12px; }
    .reasoning-content { opacity: 0.9; font-style: italic; }

    /* Components */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: all 0.3s;
    }
    .card:hover { border-color: rgba(255,255,255,0.1); }

    .input-field {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--fg);
      width: 100%;
      font-size: 14px;
      transition: all 0.2s;
    }
    .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
    
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--fg); }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); border-color: var(--fg); }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(255,255,255,0.05);
    }

    /* Chat Bubbles */
    .message-bubble {
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.4s ease-out;
      position: relative;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-left-width: 4px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stream Cursor */
    .stream-cursor::after {
      content: ' ▋';
      animation: blink 1s infinite;
      color: var(--accent);
      font-weight: bold;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    
    .modal-content {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
      transform: scale(0.95); transition: transform 0.3s;
    }
    .modal-overlay.active .modal-content { transform: scale(1); }

    /* Layout */
    .tab-nav { display: flex; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
    .tab-btn { background: none; border: none; color: var(--muted); font-weight: 600; font-size: 16px; cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: all; position: relative; }
    .tab-btn:hover { color: var(--fg); background: rgba(255,255,255,0.05); }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -17px; left: 0; width: 100%; height: 2px; background: var(--accent); }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="relative z-10 max-w-7xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="flex items-center justify-between mb-12">
      <div>
        <h1 class="text-3xl font-black tracking-tight mb-1">AI 专家组辩论智能体</h1>
        <p class="text-sm text-[var(--muted)]">支持思维链推理 · Markdown实时渲染 · 无限制上下文</p>
      </div>
      <div id="globalStatus" class="tag">
        <div class="w-2 h-2 rounded-full bg-[var(--accent)] mr-2 animate-pulse"></div>
        <span>系统就绪</span>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="config">1. 专家配置</button>
      <button class="tab-btn" data-tab="debate">2. 辩论进行</button>
      <button class="tab-btn" data-tab="summary">3. 结果总结</button>
    </nav>

    <!-- Config Panel -->
    <div id="tab-config" class="tab-content">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Left: Models -->
        <div class="lg:col-span-2 space-y-6">
          <div class="flex justify-between items-center">
            <h2 class="text-xl font-bold">参与模型</h2>
            <button id="addModelBtn" class="btn btn-ghost text-sm py-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              添加专家
            </button>
          </div>
          
          <div id="modelsList" class="space-y-4"></div>
          
          <div id="emptyState" class="text-center py-16 border-2 border-dashed border-[var(--border)] rounded-xl">
            <svg class="w-12 h-12 mx-auto text-[var(--muted)] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <p class="text-[var(--muted)] font-medium">点击上方按钮添加 AI 专家</p>
            <p class="text-xs text-[var(--muted)] mt-2">支持配置推理模型(R1/O1)展示思维链</p>
          </div>
        </div>

        <!-- Right: Settings -->
        <div class="space-y-6">
          <div class="card p-6">
            <h3 class="font-bold mb-4 text-lg flex items-center gap-2">
              <svg class="w-5 h-5 text-[var(--warning)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              辩论主题
            </h3>
            <textarea id="debateTopic" class="input-field h-32" placeholder="输入讨论的问题..."></textarea>
          </div>

          <div class="card p-6">
            <h3 class="font-bold mb-4 text-lg">参数配置</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm text-[var(--muted)] mb-2">讨论轮次 (0=无限)</label>
                <input type="number" id="roundsInput" class="input-field" value="3" min="0">
              </div>
              <div>
                <label class="block text-sm text-[var(--muted)] mb-2">分段总结限制 (字符数, 0=不分段)</label>
                <input type="number" id="summaryTokenLimit" class="input-field" value="20000" min="0">
              </div>
            </div>
          </div>

          <button id="startBtn" class="btn btn-primary w-full text-lg py-4" disabled>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
            启动辩论
          </button>
        </div>
      </div>
    </div>

    <!-- Debate Panel -->
    <div id="tab-debate" class="tab-content hidden">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Sidebar -->
        <div class="lg:col-span-1">
          <div class="card p-4 sticky top-8 space-y-4">
            <div class="flex justify-between items-center">
              <span class="text-sm text-[var(--muted)]">进度</span>
              <span id="roundProgress" class="font-bold text-[var(--accent)]">0 / 3 轮</span>
            </div>
            <div class="w-full bg-[var(--bg)] h-2 rounded-full overflow-hidden">
              <div id="progressBar" class="h-full bg-[var(--accent)] transition-all duration-500" style="width: 0%"></div>
            </div>
            
            <div class="pt-4 border-t border-[var(--border)]">
              <p class="text-xs text-[var(--muted)] mb-2">当前发言</p>
              <div id="currentSpeaker" class="font-bold text-lg truncate">等待开始...</div>
              <div id="streamingIndicator" class="tag mt-2 hidden">
                <div class="w-2 h-2 rounded-full bg-[var(--accent)] mr-2 animate-pulse"></div>
                正在思考...
              </div>
            </div>

            <button id="stopBtn" class="btn bg-red-500/10 text-red-400 border border-red-500/30 w-full hover:bg-red-500/20 mt-4">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
              终止辩论
            </button>
          </div>
        </div>

        <!-- Chat Area -->
        <div class="lg:col-span-3">
          <div id="chatContainer" class="space-y-4 pb-8">
            <div class="text-center py-20 text-[var(--muted)]">
              <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
              等待辩论开始
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Summary Panel -->
    <div id="tab-summary" class="tab-content hidden">
      <div class="max-w-4xl mx-auto space-y-8">
        <div class="card p-8">
          <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <svg class="w-6 h-6 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            分段总结
          </h2>
          <div id="segmentContainer" class="space-y-6 text-[var(--muted)]">等待辩论结束...</div>
        </div>

        <div class="card p-8 bg-gradient-to-br from-[var(--card)] to-[#0a1a2a] border-[var(--accent)]/20">
          <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <svg class="w-6 h-6 text-[var(--info)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            最终结论
          </h2>
          <div id="finalSummary" class="md-content text-[var(--muted)]">等待生成...</div>
        </div>

        <div class="flex justify-center gap-4">
          <button id="exportBtn" class="btn btn-ghost" disabled>导出报告</button>
          <button id="newDebateBtn" class="btn btn-primary">开始新辩论</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Model Config -->
  <div id="configModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="text-xl font-bold mb-6" id="modalTitle">添加模型</h3>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-[var(--muted)] mb-1">专家名称/角色</label>
            <input type="text" id="mName" class="input-field" placeholder="例如：批判家">
          </div>
          <div>
            <label class="block text-sm text-[var(--muted)] mb-1">API 提供商</label>
            <select id="mProvider" class="input-field">
              <option value="siliconflow">SiliconFlow (推荐)</option>
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI</option>
              <option value="custom">自定义</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm text-[var(--muted)] mb-1">API Base URL</label>
          <input type="text" id="mUrl" class="input-field" placeholder="https://api.siliconflow.cn/v1">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-[var(--muted)] mb-1">API Key</label>
            <input type="password" id="mKey" class="input-field" placeholder="sk-...">
          </div>
          <div>
            <label class="block text-sm text-[var(--muted)] mb-1">模型 ID</label>
            <input type="text" id="mModel" class="input-field" placeholder="deepseek-ai/DeepSeek-R1">
          </div>
        </div>

        <div>
          <label class="block text-sm text-[var(--muted)] mb-1">系统提示词</label>
          <textarea id="mPrompt" class="input-field h-32" placeholder="设定专家的性格、立场..."></textarea>
        </div>

        <!-- 关键配置：思维链开关 -->
        <div class="bg-[var(--bg-secondary)] p-4 rounded-lg border border-[var(--border)] space-y-3">
          <div class="flex items-center gap-3">
            <input type="checkbox" id="mIsReasoning" class="w-5 h-5 accent-[var(--accent-secondary)]" checked>
            <label for="mIsReasoning" class="font-semibold text-[var(--accent-secondary)]">推理模型 (显示思维链)</label>
          </div>
          <p class="text-xs text-[var(--muted)]">勾选后将解析 'reasoning_content' 字段。适用于 DeepSeek-R1, QwQ-32B 等推理模型。若模型不支持，此项无效。</p>
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" id="mEnabled" class="w-4 h-4 accent-[var(--accent)]" checked>
          <label for="mEnabled" class="text-sm">启用此模型</label>
        </div>
      </div>

      <div class="flex gap-4 mt-8">
        <button id="cancelModal" class="btn btn-ghost flex-1">取消</button>
        <button id="saveModal" class="btn btn-primary flex-1">保存配置</button>
      </div>
    </div>
  </div>

  <!-- Modal: Error -->
  <div id="errorModal" class="modal-overlay">
    <div class="modal-content text-center">
      <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      </div>
      <h3 class="text-xl font-bold mb-2">API 连接失败</h3>
      <p id="errorMsg" class="text-[var(--muted)] mb-6 text-sm whitespace-pre-wrap">错误详情...</p>
      <div class="flex gap-4">
        <button id="switchApiBtn" class="btn btn-ghost flex-1">修改配置</button>
        <button id="ignoreErrorBtn" class="btn btn-primary flex-1">继续</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置预设 ====================
    const PROVIDER_CONFIG = {
      'siliconflow': { 
        url: 'https://api.siliconflow.cn/v1', 
        model: 'deepseek-ai/DeepSeek-R1', // 默认推荐推理模型
        isReasoning: true 
      },
      'deepseek': { 
        url: 'https://api.deepseek.com', // DeepSeek官方URL，注意V3和R1接口路径可能不同，通常也是/v1
        model: 'deepseek-reasoner', 
        isReasoning: true 
      },
      'openai': { 
        url: 'https://api.openai.com/v1', 
        model: 'gpt-4o', 
        isReasoning: false 
      },
      'custom': { 
        url: '', 
        model: '', 
        isReasoning: false 
      }
    };

    const COLORS = ['#10b981', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#ef4444', '#84cc16'];

    // ==================== 状态管理 ====================
    const state = {
      models: [],
      history: [], // {model, content, reasoning, color, round}
      summaries: [],
      final: '',
      round: 0,
      running: false,
      pause: false,
      editingIdx: -1
    };

    // 初始化加载
    function loadState() {
      const saved = localStorage.getItem('ai_debate_config_v2');
      if (saved) {
        const data = JSON.parse(saved);
        state.models = data.models || [];
        $('debateTopic').value = data.topic || '';
        $('roundsInput').value = data.rounds || 3;
        $('summaryTokenLimit').value = data.limit || 20000;
      }
      renderModels();
      updateStartBtn();
    }

    function saveState() {
      localStorage.setItem('ai_debate_config_v2', JSON.stringify({
        models: state.models,
        topic: $('debateTopic').value,
        rounds: $('roundsInput').value,
        limit: $('summaryTokenLimit').value
      }));
    }

    // ==================== UI 交互 ====================
    const $ = id => document.getElementById(id);
    
    // Tab 切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        $(`tab-${btn.dataset.tab}`).classList.remove('hidden');
      });
    });

    // 模型配置 Modal
    $('addModelBtn').onclick = () => {
      state.editingIdx = -1;
      $('modalTitle').innerText = "添加模型";
      // 重置表单
      $('mName').value = '';
      $('mProvider').value = 'siliconflow';
      $('mUrl').value = PROVIDER_CONFIG.siliconflow.url;
      $('mModel').value = PROVIDER_CONFIG.siliconflow.model;
      $('mKey').value = '';
      $('mPrompt').value = '';
      $('mIsReasoning').checked = PROVIDER_CONFIG.siliconflow.isReasoning;
      $('mEnabled').checked = true;
      $('configModal').classList.add('active');
    };

    // 切换提供商自动填充
    $('mProvider').onchange = (e) => {
      const cfg = PROVIDER_CONFIG[e.target.value];
      if(cfg) {
        $('mUrl').value = cfg.url;
        $('mModel').value = cfg.model;
        $('mIsReasoning').checked = cfg.isReasoning;
      }
    };

    $('cancelModal').onclick = () => $('configModal').classList.remove('active');
    
    $('saveModal').onclick = () => {
      const model = {
        id: state.editingIdx >= 0 ? state.models[state.editingIdx].id : Date.now(),
        name: $('mName').value || `专家${state.models.length+1}`,
        provider: $('mProvider').value,
        url: $('mUrl').value,
        key: $('mKey').value,
        model: $('mModel').value,
        prompt: $('mPrompt').value,
        isReasoning: $('mIsReasoning').checked, // 新增字段
        enabled: $('mEnabled').checked,
        color: state.editingIdx >= 0 ? state.models[state.editingIdx].color : COLORS[state.models.length % COLORS.length]
      };

      if (!model.key) return alert('请输入 API Key');
      if (!model.url) return alert('请输入 Base URL');
      
      if (state.editingIdx >= 0) {
        state.models[state.editingIdx] = model;
      } else {
        state.models.push(model);
      }
      
      saveState();
      renderModels();
      updateStartBtn();
      $('configModal').classList.remove('active');
    };

    function renderModels() {
      const list = $('modelsList');
      const empty = $('emptyState');
      const activeModels = state.models.filter(m => m.enabled);
      
      if (activeModels.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      
      empty.classList.add('hidden');
      list.innerHTML = activeModels.map((m, i) => `
        <div class="card p-4 border-l-4 flex justify-between items-center" style="border-left-color: ${m.color}">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <div class="w-3 h-3 rounded-full" style="background: ${m.color}"></div>
              <h4 class="font-bold">${m.name}</h4>
              ${m.isReasoning ? '<span class="tag text-[10px] bg-blue-500/20 text-blue-300">推理模型</span>' : ''}
            </div>
            <p class="text-xs text-[var(--muted)]">${m.model}</p>
          </div>
          <div class="flex gap-1">
            <button onclick="editM(${i})" class="p-2 hover:bg-white/5 rounded text-xs">编辑</button>
            <button onclick="delM(${i})" class="p-2 hover:bg-red-500/10 rounded text-xs text-red-400">删除</button>
          </div>
        </div>
      `).join('');
    }

    window.editM = (i) => {
      state.editingIdx = i;
      const m = state.models[i];
      $('modalTitle').innerText = "编辑模型";
      $('mName').value = m.name;
      $('mProvider').value = m.provider;
      $('mUrl').value = m.url;
      $('mKey').value = m.key;
      $('mModel').value = m.model;
      $('mPrompt').value = m.prompt;
      $('mIsReasoning').checked = m.isReasoning;
      $('mEnabled').checked = m.enabled;
      $('configModal').classList.add('active');
    };

    window.delM = (i) => {
      if(confirm('确定删除该模型吗？')) {
        state.models.splice(i, 1);
        saveState();
        renderModels();
        updateStartBtn();
      }
    };

    $('debateTopic').oninput = () => { saveState(); updateStartBtn(); };
    $('roundsInput').oninput = saveState;
    $('summaryTokenLimit').oninput = saveState;

    function updateStartBtn() {
      const hasModels = state.models.filter(m => m.enabled).length >= 2;
      const hasTopic = $('debateTopic').value.trim().length > 0;
      $('startBtn').disabled = !hasModels || !hasTopic;
    }

    // ==================== 核心辩论逻辑 ====================
    
    // 流式调用 - 支持思维链
    async function streamCall(model, messages, onChunk, retries = 3) {
      const url = `${model.url}/chat/completions`;
      const body = {
        model: model.model,
        messages: [
          ...(model.prompt ? [{role: 'system', content: model.prompt}] : []),
          ...messages
        ],
        stream: true,
        max_tokens: 8192
      };

      try {
        const resp = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${model.key}`
          },
          body: JSON.stringify(body)
        });

        if (!resp.ok) {
          const errText = await resp.text();
          throw new Error(`API错误 ${resp.status}: ${errText}`);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        
        // 状态存储
        let fullReasoning = '';
        let fullContent = '';
        let buffer = '';

        while(true) {
          const {done, value} = await reader.read();
          if (done) break;
          
          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const jsonStr = line.slice(6);
              if (jsonStr === '[DONE]') continue;
              try {
                const json = JSON.parse(jsonStr);
                const delta = json.choices?.[0]?.delta;
                
                if (delta) {
                  // 1. 检查是否有推理内容
                  if (delta.reasoning_content) {
                    fullReasoning += delta.reasoning_content;
                  }
                  // 2. 检查最终回答
                  if (delta.content) {
                    fullContent += delta.content;
                  }
                  
                  // 回调更新UI
                  onChunk(fullReasoning, fullContent);
                }
              } catch (e) { /* ignore */ }
            }
          }
        }
        return { reasoning: fullReasoning, content: fullContent };
      } catch (err) {
        if (retries > 0) {
          console.warn(`重试 ${model.name}...`);
          await new Promise(r => setTimeout(r, 1500));
          return streamCall(model, messages, onChunk, retries - 1);
        } else {
          showError(model.name, err.message);
          throw err;
        }
      }
    }

    // 非流式调用 (用于总结)
    async function callApi(model, messages) {
      const url = `${model.url}/chat/completions`;
      const body = {
        model: model.model,
        messages: [
          ...(model.prompt ? [{role: 'system', content: model.prompt}] : []),
          ...messages
        ],
        max_tokens: 8192
      };
      
      const resp = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${model.key}`
        },
        body: JSON.stringify(body)
      });
      
      if (!resp.ok) throw new Error(`API Error ${resp.status}`);
      const data = await resp.json();
      // 通常总结不需要推理链，只取content
      return data.choices[0].message.content;
    }

    // 错误处理
    function showError(name, msg) {
      $('errorMsg').innerText = `${name} 连接失败:\n${msg}`;
      $('errorModal').classList.add('active');
      state.pause = true;
    }

    $('switchApiBtn').onclick = () => {
      $('errorModal').classList.remove('active');
      document.querySelector('.tab-btn[data-tab="config"]').click();
      state.running = false;
    };

    $('ignoreErrorBtn').onclick = () => {
      $('errorModal').classList.remove('active');
      state.pause = false;
    };

    // 辩论主流程
    $('startBtn').onclick = async () => {
      state.running = true;
      state.history = [];
      state.round = 0;
      const maxRounds = parseInt($('roundsInput').value) || 0;
      const models = state.models.filter(m => m.enabled);
      const topic = $('debateTopic').value;

      document.querySelector('.tab-btn[data-tab="debate"]').click();
      $('chatContainer').innerHTML = '';
      $('globalStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-[var(--accent)] mr-2 animate-pulse"></div><span>辩论进行中</span>';
      
      addSystemMsg(`辩论主题: "${topic}"`);

      while(state.running) {
        state.round++;
        if (maxRounds > 0 && state.round > maxRounds) break;

        updateProgress(state.round, maxRounds);
        addSystemMsg(`第 ${state.round} 轮开始`);

        for (const model of models) {
          if (!state.running) break;
          if (state.pause) await waitForResume();

          $('currentSpeaker').innerText = model.name;
          $('currentSpeaker').style.color = model.color;
          $('streamingIndicator').classList.remove('hidden');

          const msgId = createMsgBubble(model, state.round);
          const context = buildContext(topic);
          
          try {
            const result = await streamCall(model, context, (reasoning, content) => {
              updateMsgBubble(msgId, reasoning, content, model.isReasoning);
            });
            
            state.history.push({
              model: model.name, 
              content: result.content, 
              reasoning: result.reasoning, // 存储推理过程
              color: model.color, 
              round: state.round
            });
          } catch (e) {
            updateMsgBubble(msgId, '', '[[ 回复失败，已跳过 ]]', false, true);
          }
          
          finalizeMsgBubble(msgId);
          $('streamingIndicator').classList.add('hidden');
        }
      }

      addSystemMsg('辩论结束，正在生成总结...');
      $('globalStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-[var(--info)] mr-2"></div><span>正在总结</span>';
      
      await generateSummaries(models, topic);
      
      state.running = false;
      $('globalStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-[var(--success)] mr-2"></div><span>已完成</span>';
      $('exportBtn').disabled = false;
    };

    $('stopBtn').onclick = () => {
      if(confirm('确定要终止辩论吗？')) state.running = false;
    };

    function waitForResume() {
      return new Promise(res => {
        const check = setInterval(() => {
          if (!state.pause) { clearInterval(check); res(); }
        }, 300);
      });
    }

    // 构建上下文：只传递最终回答，不传递推理过程（节省Token，避免上下文溢出）
    function buildContext(topic) {
      const msgs = [{role: 'user', content: `辩论主题: ${topic}\n请发表你的观点。`}];
      state.history.forEach(h => {
        msgs.push({role: 'assistant', content: `[${h.model}]: ${h.content}`});
      });
      return msgs;
    }

    function updateProgress(curr, max) {
      const displayMax = max === 0 ? '∞' : max;
      $('roundProgress').innerText = `${curr} / ${displayMax} 轮`;
      if (max > 0) $('progressBar').style.width = `${(curr/max)*100}%`;
      else $('progressBar').style.width = `${(curr%10)*10}%`;
    }

    // ==================== UI 消息渲染 (重构) ====================
    function addSystemMsg(text) {
      const el = document.createElement('div');
      el.className = 'py-3 px-4 rounded-lg bg-white/5 text-center text-[var(--muted)] text-sm my-4';
      el.innerText = text;
      $('chatContainer').appendChild(el);
      scrollBottom();
    }

    function createMsgBubble(model, round) {
      const id = `msg-${Date.now()}`;
      const el = document.createElement('div');
      el.id = id;
      el.className = 'message-bubble card';
      el.style.borderLeftColor = model.color;
      
      // 基础结构
      el.innerHTML = `
        <div class="flex items-center gap-2 mb-3">
          <span class="font-bold" style="color:${model.color}">${model.name}</span>
          <span class="text-xs text-[var(--muted)] opacity-50">Round ${round}</span>
        </div>
        <!-- 推理区块 -->
        <div class="reasoning-wrapper hidden">
          <details class="reasoning-block">
            <summary>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
              思考过程
            </summary>
            <div class="reasoning-content md-content"></div>
          </details>
        </div>
        <!-- 最终回答 -->
        <div class="final-content md-content stream-cursor">思考中...</div>
      `;
      
      $('chatContainer').appendChild(el);
      scrollBottom();
      return id;
    }

    function updateMsgBubble(id, reasoning, content, isReasoningModel, isError = false) {
      const el = $(id);
      if (!el) return;
      
      // 处理推理部分
      const reasoningWrapper = el.querySelector('.reasoning-wrapper');
      const reasoningContentEl = el.querySelector('.reasoning-content');
      
      if (isReasoningModel && reasoning && reasoning.length > 0) {
        reasoningWrapper.classList.remove('hidden');
        // 实时渲染 Markdown
        reasoningContentEl.innerHTML = marked.parse(reasoning);
      }
      
      // 处理最终回答
      const finalContent = el.querySelector('.final-content');
      if (content) {
        finalContent.innerHTML = marked.parse(content);
        // 代码高亮
        finalContent.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
      }
      
      if (isError) {
        finalContent.innerHTML = `<div class="text-red-400">${content}</div>`;
      }
      
      scrollBottom();
    }

    function finalizeMsgBubble(id) {
      const el = $(id);
      if (el) {
        el.querySelector('.final-content')?.classList.remove('stream-cursor');
        // 默认展开第一个推理块
        // el.querySelector('details')?.setAttribute('open', true);
      }
    }

    function scrollBottom() {
      $('chatContainer').scrollTop = $('chatContainer').scrollHeight;
    }

    // ==================== 总结逻辑 (支持 Markdown) ====================
    async function generateSummaries(models, topic) {
      document.querySelector('.tab-btn[data-tab="summary"]').click();
      
      const limit = parseInt($('summaryTokenLimit').value) || 0;
      const segments = segmentHistory(limit);
      
      $('segmentContainer').innerHTML = '<p class="text-center py-8">正在生成分段总结...</p>';
      $('finalSummary').innerHTML = '<p class="text-center py-8">等待分段总结完成...</p>';

      state.summaries = [];

      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        // 包含推理过程构建更完整的上下文？为了节省Token，这里只用content
        const context = seg.map(s => `[${s.model}]: ${s.content}`).join('\n\n---\n\n');
        
        const promises = models.map(m => 
          callApi(m, [{
            role: 'user', 
            content: `请总结以下辩论片段的核心观点:\n主题: ${topic}\n\n内容:\n${context}`
          }]).catch(e => `[${m.name}] 总结失败`)
        );
        
        const results = await Promise.all(promises);
        
        state.summaries.push({
          idx: i+1,
          results: models.map((m, idx) => ({name: m.name, color: m.color, text: results[idx]}))
        });

        renderSegmentSummary();
      }

      // 最终总结
      const allSummaries = state.summaries.map(s => 
        `=== 第${s.idx}段 ===\n${s.results.map(r => `[${r.name}]: ${r.text}`).join('\n')}`
      ).join('\n\n');

      const finalPromises = models.map(m =>
        callApi(m, [{
          role: 'user',
          content: `基于以下分段总结，请生成最终的辩论结论报告:\n主题: ${topic}\n\n${allSummaries}\n\n要求：结构清晰，列出共识与分歧，给出建议。`
        }]).catch(e => `[${m.name}] 总结失败`)
      );

      const finalResults = await Promise.all(finalPromises);
      
      // 渲染最终总结
      $('finalSummary').innerHTML = finalResults.map((text, i) => `
        <div class="mb-6 p-4 rounded-lg bg-white/5 border-l-2" style="border-color: ${models[i].color}">
          <h4 class="font-bold mb-2" style="color:${models[i].color}">${models[i].name} 的最终结论</h4>
          <div class="md-content">${marked.parse(text)}</div>
        </div>
      `).join('');
      
      $('finalSummary').querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    function segmentHistory(limit) {
      if (limit === 0) return [state.history];
      
      const segments = [];
      let current = [];
      let length = 0;

      state.history.forEach(h => {
        const len = h.content.length + (h.reasoning?.length || 0);
        if (length + len > limit && current.length > 0) {
          segments.push(current);
          current = [];
          length = 0;
        }
        current.push(h);
        length += len;
      });

      if (current.length > 0) segments.push(current);
      return segments;
    }

    // 渲染分段总结 - 添加 Markdown 支持
    function renderSegmentSummary() {
      $('segmentContainer').innerHTML = state.summaries.map(seg => `
        <div class="border border-[var(--border)] rounded-lg p-6 bg-[var(--bg-secondary)]">
          <h4 class="font-bold text-[var(--accent)] mb-4 text-lg">第 ${seg.idx} 段总结</h4>
          <div class="space-y-4">
            ${seg.results.map(r => `
              <div class="border-l-2 pl-4" style="border-color: ${r.color}">
                <div class="font-semibold mb-1" style="color:${r.color}">${r.name}</div>
                <div class="md-content text-sm">${marked.parse(r.text)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
      
      // 触发代码高亮
      $('segmentContainer').querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    // ==================== 导出功能 ====================
    $('exportBtn').onclick = () => {
      const topic = $('debateTopic').value;
      let text = `# AI专家组辩论报告\n\n## 主题: ${topic}\n\n`;
      
      text += `## 完整记录\n\n`;
      state.history.forEach(h => {
        text += `### ${h.model} (Round ${h.round})\n`;
        if(h.reasoning) text += `> 思考过程:\n${h.reasoning}\n\n`;
        text += `${h.content}\n\n`;
      });

      text += `## 总结\n\n`;
      // 简单获取 finalSummary 的文本内容
      text += $('finalSummary').innerText;

      const blob = new Blob([text], {type: 'text/markdown'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `辩论报告_${new Date().toLocaleDateString()}.md`;
      a.click();
    };

    $('newDebateBtn').onclick = () => {
      if(confirm('开始新辩论？当前数据将被清空。')) {
        state.history = [];
        state.summaries = [];
        state.round = 0;
        document.querySelector('.tab-btn[data-tab="config"]').click();
        $('globalStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-[var(--accent)] mr-2 animate-pulse"></div><span>系统就绪</span>';
      }
    };

    // ==================== 初始化 ====================
    loadState();
  </script>
</body>
</html>
